name: Reproduce stale COPY cache

on:
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with GHA cache (first build — primes the cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: integrity-test:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify first build matches source
        run: ./verify-image-integrity.sh integrity-test:v1 /app .

      - name: Modify source file (simulates a code change between builds)
        run: |
          echo '{"version": "2.0.0", "feature": "updated"}' > config.json
          echo "Source file changed:"
          cat config.json

      - name: Rebuild with GHA cache (second build — cache may serve stale COPY)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: integrity-test:v2
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify second build matches source (this may fail)
        run: |
          echo "Expected: config.json should contain version 2.0.0"
          echo "Actual contents in image:"
          docker run --rm integrity-test:v2 cat /app/config.json
          echo ""
          ./verify-image-integrity.sh integrity-test:v2 /app . || echo "⚠️ STALE CACHE DETECTED — the image has old files"

      - name: Rebuild WITHOUT cache (control — should always match)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: integrity-test:v3
          no-cache: true

      - name: Verify no-cache build matches source (should always pass)
        run: ./verify-image-integrity.sh integrity-test:v3 /app .
