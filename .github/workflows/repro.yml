name: Reproduce stale COPY cache

on:
  workflow_dispatch:
  push:
    paths:
      - 'config.json'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/repro.yml'

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:v0.28.0

      - name: Build with GHA cache (will reuse cache from prior workflow runs)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: integrity-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show config.json contents from image
        run: |
          echo "Source config.json:"
          cat config.json
          echo ""
          echo "Image config.json:"
          docker run --rm integrity-test:latest cat /app/config.json

      - name: Verify image matches source
        run: |
          ./verify-image-integrity.sh integrity-test:latest /app . || {
            echo "⚠️ STALE CACHE DETECTED — the image has old files"
            exit 1
          }
